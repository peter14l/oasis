<html>
  <head>
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="" />
    <link
      rel="stylesheet"
      as="style"
      onload="this.rel='stylesheet'"
      href="https://fonts.googleapis.com/css2?display=swap&amp;family=Noto+Sans%3Awght%40400%3B500%3B700%3B900&amp;family=Spline+Sans%3Awght%40400%3B500%3B700"
    />

    <title>Stitch Design</title>
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64," />

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  </head>
  <body>
    <div
      class="relative flex h-auto min-h-screen w-full flex-col bg-[#111318] dark justify-between group/design-root overflow-x-hidden"
      style='font-family: "Spline Sans", "Noto Sans", sans-serif;'
    >
      <div>
        <div class="flex items-center bg-[#111318] p-4 pb-2 justify-between">
          <div class="text-white flex size-12 shrink-0 items-center" data-icon="ArrowLeft" data-size="24px" data-weight="regular">
            <svg xmlns="http://www.w3.org/2000/svg" width="24px" height="24px" fill="currentColor" viewBox="0 0 256 256">
              <path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path>
            </svg>
          </div>
          <h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Create community</h2>
        </div>
        <h1 class="text-white text-[22px] font-bold leading-tight tracking-[-0.015em] px-4 text-left pb-3 pt-5">Review your community</h1>
        <div class="flex items-center gap-4 bg-[#111318] px-4 min-h-14 justify-between">
          <p class="text-white text-base font-normal leading-normal flex-1 truncate">Community name</p>
          <div class="shrink-0"><p class="text-white text-base font-normal leading-normal">Tech Enthusiasts</p></div>
        </div>
        <div class="flex items-center gap-4 bg-[#111318] px-4 min-h-14 justify-between">
          <p class="text-white text-base font-normal leading-normal flex-1 truncate">Community type</p>
          <div class="shrink-0"><p class="text-white text-base font-normal leading-normal">Public</p></div>
        </div>
        <div class="flex items-center gap-4 bg-[#111318] px-4 min-h-14 justify-between">
          <p class="text-white text-base font-normal leading-normal flex-1 truncate">Community description</p>
          <div class="shrink-0">
            <p class="text-white text-base font-normal leading-normal">A place for tech lovers to discuss the latest gadgets, software, and industry news.</p>
          </div>
        </div>
        <div class="flex items-center gap-4 bg-[#111318] px-4 min-h-14 justify-between">
          <p class="text-white text-base font-normal leading-normal flex-1 truncate">Community rules</p>
          <div class="shrink-0"><p class="text-white text-base font-normal leading-normal">Be respectful, stay on topic, and no spamming.</p></div>
        </div>
      </div>
      <div>
        <div class="flex justify-stretch">
          <div class="flex flex-1 gap-3 flex-wrap px-4 py-3 justify-between">
            <button
              class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-12 px-5 bg-[#282e39] text-white text-base font-bold leading-normal tracking-[0.015em]"
            >
              <span class="truncate">Back</span>
            </button>
            <button
              class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-12 px-5 bg-[#1152d4] text-white text-base font-bold leading-normal tracking-[0.015em]"
            >
              <span class="truncate">Create Community</span>
            </button>
          </div>
        </div>
        <div class="h-5 bg-[#111318]"></div>
      </div>
    </div>
  </body>
</html>
