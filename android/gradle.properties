android.useAndroidX=true
android.enableJetifier=true
# Disable R8 Full Mode to prevent Flutter app crashes on startup
android.enableR8.fullMode=false
# Using default build directory
gradle.user.home=F:/GradleCache

# Increase Gradle JVM heap size to fix OOM
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError

# Disable file watching in CI to avoid "Already watching path" errors
org.gradle.vfs.watch=false
