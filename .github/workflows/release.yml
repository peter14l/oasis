name: Release Build (APK & MSIX)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK (Release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Create .env from secrets
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" >> .env
          echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> .env

      - name: Build Release APK
        run: |
          flutter build apk --release --split-per-abi --dart-define-from-file=".env" --no-pub

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: build/app/outputs/flutter-apk/app-*-release.apk

  build-windows:
    name: Build Windows MSIX (Release)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Create .env from secrets
        shell: bash
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" >> .env
          echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> .env

      - name: Fix googlesource.com 403 error (zlib submodule)
        run: |
          git config --global url."https://github.com/chromium/zlib".insteadOf "https://chromium.googlesource.com/chromium/src/third_party/zlib"

      - name: Disable sentry-native (avoid crashpad 403 error on googlesource.com)
        run: |
          echo "SENTRY_NATIVE_BACKEND=none" >> .env

      - name: Build Windows
        run: flutter build windows --release --dart-define-from-file=".env"
        env:
          SENTRY_NATIVE_BACKEND: none

      - name: Create MSIX
        run: dart run msix:create --build-windows false

      - name: Upload MSIX
        uses: actions/upload-artifact@v4
        with:
          name: release-msix
          path: |
            build/windows/x64/runner/Release/*.msix
            test_certificate.pfx
