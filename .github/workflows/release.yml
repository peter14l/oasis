name: Release Build (APK & MSIX)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK (Release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Decode Keystore
        if: secrets.RELEASE_KEYSTORE_BASE64 != ''
        run: |
          echo '${{ secrets.RELEASE_KEYSTORE_BASE64 }}' | base64 -d > release.keystore
          echo "Keystore decoded successfully"
        shell: bash

      - name: Configure Signing
        if: secrets.RELEASE_KEYSTORE_BASE64 != ''
        run: |
          echo "RELEASE_STORE_FILE=release.keystore" >> $GITHUB_ENV
          echo "RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEYSTORE_ALIAS }}" >> $GITHUB_ENV
          echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
        shell: bash

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Create .env from secrets
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" >> .env
          echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> .env
          echo "GIPHY_WEB_KEY=${{ secrets.GIPHY_WEB_KEY }}" >> .env
          echo "GIPHY_ANDROID_KEY=${{ secrets.GIPHY_ANDROID_KEY }}" >> .env
          echo "GIPHY_IOS_KEY=${{ secrets.GIPHY_IOS_KEY }}" >> .env
          echo "GIPHY_WINDOWS_KEY=${{ secrets.GIPHY_WINDOWS_KEY }}" >> .env
          echo "GIPHY_MACOS_KEY=${{ secrets.GIPHY_MACOS_KEY }}" >> .env
          echo "WEB_KEY=${{ secrets.WEB_KEY }}" >> .env
          echo "ANDROID_KEY=${{ secrets.ANDROID_KEY }}" >> .env
          echo "IOS_KEY=${{ secrets.IOS_KEY }}" >> .env
          echo "WINDOWS_KEY=${{ secrets.WINDOWS_KEY }}" >> .env
          echo "MACOS_KEY=${{ secrets.MACOS_KEY }}" >> .env

      - name: Build Release APK
        run: |
          flutter build apk --release --split-per-abi --dart-define-from-file=".env" --no-pub
          
          # Verify APK signing
          if [[ -f "release.keystore" ]] && [[ -f "build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk" ]]; then
            keytool -printcert -jarfile build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk 2>/dev/null | grep -q "Owner:" && echo "✅ APK is properly signed"
          fi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: build/app/outputs/flutter-apk/app-*-release.apk

  build-windows:
    name: Build Windows MSIX (Release)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Create .env from secrets
        shell: bash
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" >> .env
          echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> .env
          echo "GIPHY_WEB_KEY=${{ secrets.GIPHY_WEB_KEY }}" >> .env
          echo "GIPHY_ANDROID_KEY=${{ secrets.GIPHY_ANDROID_KEY }}" >> .env
          echo "GIPHY_IOS_KEY=${{ secrets.GIPHY_IOS_KEY }}" >> .env
          echo "GIPHY_WINDOWS_KEY=${{ secrets.GIPHY_WINDOWS_KEY }}" >> .env
          echo "GIPHY_MACOS_KEY=${{ secrets.GIPHY_MACOS_KEY }}" >> .env
          echo "WEB_KEY=${{ secrets.WEB_KEY }}" >> .env
          echo "ANDROID_KEY=${{ secrets.ANDROID_KEY }}" >> .env
          echo "IOS_KEY=${{ secrets.IOS_KEY }}" >> .env
          echo "WINDOWS_KEY=${{ secrets.WINDOWS_KEY }}" >> .env
          echo "MACOS_KEY=${{ secrets.MACOS_KEY }}" >> .env

      - name: Patch sentry_flutter to skip submodules
        shell: pwsh
        run: |
          $path = "windows/flutter/ephemeral/.plugin_symlinks/sentry_flutter/sentry-native/sentry-native.cmake"
          if (Test-Path $path) {
            $content = Get-Content $path -Raw
            $old = 'GIT_TAG \${SENTRY_NATIVE_version}'
            $new = "GIT_TAG `${SENTRY_NATIVE_version}`n    GIT_SUBMODULES `"`""
            $content = $content -replace $old, $new
            Set-Content -Path $path -Value $content -NoNewline
            Write-Host "Successfully patched $path to skip submodules"
          } else {
            Write-Warning "Could not find $path"
          }

      - name: Disable sentry-native (avoid crashpad 403 error on googlesource.com)
        run: |
          echo "SENTRY_NATIVE_BACKEND=none" >> .env

      - name: Build Windows
        run: flutter build windows --release --dart-define-from-file=".env"
        env:
          SENTRY_NATIVE_BACKEND: none
          SENTRY_BACKEND: none

      - name: Create MSIX
        run: dart run msix:create --build-windows false

      - name: Upload MSIX
        uses: actions/upload-artifact@v4
        with:
          name: release-msix
          path: |
            build/windows/x64/runner/Release/*.msix
            test_certificate.pfx
