name: Build macOS DMG

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-:hash:'
          cache-path: '${{ runner.tool_cache }}/flutter'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            **/.dart_tool/build_runner
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS App
        run: flutter build macos --release

      - name: Create DMG
        run: |
          npm install -g appdmg
          echo '{
            "title": "Oasis",
            "icon": "assets/images/logo.png",
            "contents": [
              { "x": 448, "y": 344, "type": "link", "path": "/Applications" },
              { "x": 192, "y": 344, "type": "file", "path": "build/macos/Build/Products/Release/oasis_v2.app" }
            ]
          }' > dmg-config.json
          
          # Try advanced DMG creation, fallback to simple hdiutil if appdmg fails
          appdmg dmg-config.json Oasis-macOS.dmg || (
            echo "Advanced DMG creation failed, falling back to simple DMG..."
            hdiutil create -format UDZO -srcfolder build/macos/Build/Products/Release/oasis_v2.app Oasis-macOS.dmg
          )

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macOS-DMG
          path: Oasis-macOS.dmg
