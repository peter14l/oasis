name: oasis_v2
description: "A modern social media app for sharing moments and connecting with communities."

publish_to: 'none' 

version: 4.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  sentry_flutter: ^9.8.0
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  google_fonts: ^6.1.0
  flutter_screenutil: ^5.9.3
  image_picker: ^1.0.7
  image_cropper: ^11.0.0
  shimmer: ^3.0.0
  flutter_animate: ^4.2.0
  carousel_slider: ^4.2.1
  like_button: ^2.0.5
  animate_do: ^3.3.4
  photo_view: ^0.15.0
  gal: ^2.3.0
  fl_chart: ^0.66.0
  
  # Supabase
  supabase_flutter: ^2.3.4
  gotrue: ^2.9.1
  postgrest: ^2.4.1
  flutter_dotenv: ^5.1.0
  realtime_client: ^2.4.1
  storage_client: ^2.2.1
  functions_client: ^2.2.1
  google_sign_in: ^6.1.6
  sign_in_with_apple: ^6.1.1
  
  # State Management
  provider: ^6.1.1
  
  # Navigation
  go_router: ^13.2.5
  app_links: ^6.3.2

  # UI Utils
  visibility_detector: ^0.4.0+2
  
  # Network
  dio: ^5.4.0
  http: ^1.1.0
  
  # Local Storage & Utils
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  timeago: ^3.6.3
  flutter_local_notifications: ^19.5.0
  firebase_core: ^3.11.0
  firebase_messaging: ^15.2.10
  google_sign_in_all_platforms: ^1.1.0
  
  # Form Validation
  form_validator: ^2.0.0
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.2.2
  logger: ^2.0.2
  crypto: ^3.0.3

  
  # Platform interface compatibility
  plugin_platform_interface: ^2.1.8

  # Additional Media & Files
  file_picker: ^8.0.0
  video_player: ^2.8.2
  chewie: ^1.7.4

  # Voice Recording & Playback (disabled for Windows compatibility)
  record: ^6.1.2
  audioplayers: ^6.5.1

  # Location Services
  geolocator: ^10.1.0
  google_maps_flutter: ^2.5.3

  # Media Display
  flutter_cache_manager: ^3.3.1

  # UI Components for Messaging
  flutter_colorpicker: ^1.0.3

  # File Utilities
  mime: ^1.0.4
  open_filex: ^4.3.4
  flutter_image_compress: ^2.1.0
  path: ^1.8.3

  # Encryption & Security
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.0.0
  libsignal_protocol_dart: 0.7.2
  palette_generator: ^0.3.3+4
  basic_utils: ^5.7.0
  pointycastle: ^3.9.1
  navigation_bar_m3e: ^0.1.1
  flutter_staggered_grid_view: ^0.7.0
  any_link_preview: ^3.0.3
  sensors_plus: ^4.0.2  # Gyroscope for Pulse Map parallax
  fluentui_system_icons: ^1.1.273
  local_auth: ^3.0.1
  flutter_webrtc: ^0.12.1
  permission_handler: ^11.3.1
  receive_sharing_intent: ^1.8.1
  emoji_picker_flutter: ^4.4.0
  universal_io: ^2.3.1

dev_dependencies:
  msix: ^3.16.1
  sentry_dart_plugin: ^3.2.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1
  mockito: ^5.4.4
  test: ^1.24.10
  integration_test:
    sdk: flutter

msix_config:
  display_name: Oasis V2
  publisher_display_name: Oasis
  publisher: CN=Oasis, O=Oasis, L=Delhi, S=Delhi, C=IN
  identity_name: com.oasis.v2
  msix_version: 4.0.0.0
  logo_path: assets/images/app_icon.png
  capabilities: internetClient, location, microphone, webcam
  architecture: x64
  generate_certificate: true
  install_certificate: true

dependency_overrides:
  flutter_secure_storage_windows:
    path: ./stubs/flutter_secure_storage_windows
  flutter_local_notifications_windows:
    path: ./stubs/flutter_local_notifications_windows


flutter:
  uses-material-design: true

  # Assets including .env file
  assets:
    - .env
    - assets/images/
    - assets/svgs/
    - assets/audio/

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: morrow
  org: cresca
